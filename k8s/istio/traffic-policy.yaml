apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: hello-dr
  namespace: discovery-mesh
spec:
  host: hello.discovery-mesh.svc.cluster.local
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: hello-vs
  namespace: discovery-mesh
spec:
  hosts:
    - hello.discovery-mesh.svc.cluster.local
  http:
    - retries:
        attempts: 3
        perTryTimeout: 2s
      route:
        - destination:
            host: hello.discovery-mesh.svc.cluster.local
            subset: v1
          weight: 50
        - destination:
            host: hello.discovery-mesh.svc.cluster.local
            subset: v2
          weight: 50
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: discovery-mesh
spec:
  mtls:
    mode: STRICT
